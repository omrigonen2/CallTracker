services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  app:
    build: .
    restart: unless-stopped
    depends_on:
      - mongo
      - redis
    env_file: .env
    environment:
      MONGODB_URI: mongodb://mongo:27017/calltracker
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"

  worker:
    build: .
    restart: unless-stopped
    depends_on:
      - mongo
      - redis
    env_file: .env
    environment:
      MONGODB_URI: mongodb://mongo:27017/calltracker
      REDIS_URL: redis://redis:6379
    command: ["node", "src/workers/index.js"]

volumes:
  mongo_data:
